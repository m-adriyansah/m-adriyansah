<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Adriyansah - Portfolio</title>
    <style>
        :root {
            --primary: #00ff88; /* Hijau Neon lebih terang */
            --bg: #050505;      /* Hitam pekat */
            --text: #ffffff;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }
        
        /* Modal Pop-up */
        #ui-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: rgba(10, 20, 10, 0.95); /* Sedikit kehijauan */
            border: 2px solid var(--primary);
            padding: 25px;
            width: 85%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
            display: none;
            z-index: 100;
            color: var(--text);
        }
        #ui-modal.active {
            display: block;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        /* Typography Modal */
        h2 { color: var(--primary); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1.4rem; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        p, li { font-size: 0.95rem; line-height: 1.6; color: #eee; }
        .highlight { color: var(--primary); font-weight: bold; }
        
        /* Tombol & Link */
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            font-weight: bold;
            font-size: 1rem;
            color: #000;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,255,136,0.4);
        }
        .wa-btn {
            display: block;
            background: rgba(37, 211, 102, 0.1);
            border: 2px solid #25D366;
            color: #25D366;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
        }
        
        /* Instruksi Bawah */
        #instruct {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: var(--primary);
            font-size: 0.9rem;
            pointer-events: none;
            font-weight: bold;
            text-shadow: 0 2px 4px #000;
            background: linear-gradient(to top, #000 0%, transparent 100%);
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-modal">
        <div id="modal-content"></div>
        <button onclick="closeModal()">Tutup (x)</button>
    </div>

    <div id="instruct">
        TAP LAYAR UNTUK BERGERAK
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('ui-modal');
        const content = document.getElementById('modal-content');

        let width, height;
        let isMobile = false;
        
        // --- DATA CV ---
        const data = {
            profile: `<h2>🧙‍♂️ Profil Saya</h2>
                      <p><b>M. Adriyansah</b><br>IT Support & Network Enthusiast.</p>
                      <p>Mahasiswa tingkat akhir yang hobi oprek server, troubleshooting PC, dan memastikan jaringan lancar jaya.</p>
                      <p><span class="highlight">Skill:</span> Windows/Linux Server, Mikrotik Basics, Hardware Repair.</p>`,
            
            exp: `<h2>💼 Pengalaman</h2>
                  <p><span class="highlight">PT. Raharja Sinergi Komunikasi</span><br>
                  <i>Network Technician (2026)</i><br>• Troubleshooting jaringan & support user.</p>
                  <p><span class="highlight">Digitech University</span><br>
                  <i>Asisten IT (2021-2022)</i><br>• Maintenance lab & PC kampus.</p>`,
            
            edu: `<h2>🎓 Pendidikan</h2>
                  <p><b>S1 Teknik Informatika</b><br>Digitech University (2021-Now)</p>
                  <p><b>TKJ</b><br>SMKN 1 Katapang</p>
                  <p><b>Bahasa:</b> 🇮🇩 ID, 🇯🇵 JP (N4), 🇬🇧 EN (Basic)</p>`,
            
            contact: `<h2>📞 Kontak</h2>
                      <p>Siap bekerja segera!</p>
                      <p>📧 aldimadara2@gmail.com<br>📍 Bandung, Indonesia</p>
                      <a href="https://wa.me/6283817072264?text=Halo%20Adriyansah,%20saya%20lihat%20web%20Anda" class="wa-btn">
                        Chat WhatsApp 💬
                      </a>`
        };

        let player = { x: 0, y: 0, size: 40, tx: null, ty: null };
        let objects = [];
        let modalOpen = false;
        let tapEffect = { x: 0, y: 0, active: false, radius: 0 };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            isMobile = width < 600;

            player.x = width / 2;
            player.y = height / 2;

            objects = [
                { id: 'profile', emoji: '📋', label: 'PROFIL', text: data.profile },
                { id: 'exp', emoji: '💼', label: 'KERJA', text: data.exp },
                { id: 'edu', emoji: '🎓', label: 'STUDI', text: data.edu },
                { id: 'contact', emoji: '📞', label: 'KONTAK', text: data.contact }
            ];

            let cx = width / 2;
            let cy = height / 2;
            // Jarak antar ikon diatur agar pas di layar HP
            let spreadY = isMobile ? height / 3.5 : 150; 
            let spreadX = isMobile ? width / 2.5 : 250;

            if (isMobile) {
                // Layout Diamond Vertikal untuk HP
                objects[0].x = cx;          objects[0].y = cy - spreadY; // Atas
                objects[1].x = cx + spreadX; objects[1].y = cy;          // Kanan
                objects[2].x = cx - spreadX; objects[2].y = cy;          // Kiri
                objects[3].x = cx;          objects[3].y = cy + spreadY; // Bawah
            } else {
                objects[0].x = cx - 200; objects[0].y = cy - 100;
                objects[1].x = cx + 200; objects[1].y = cy - 100;
                objects[2].x = cx - 200; objects[2].y = cy + 100;
                objects[3].x = cx + 200; objects[3].y = cy + 100;
            }
        }

        window.addEventListener('resize', resize);
        resize();

        // --- INPUT ---
        canvas.addEventListener('pointerdown', e => {
            if (modalOpen) return;
            player.tx = e.clientX;
            player.ty = e.clientY;
            
            // Efek Tap Visual
            tapEffect.x = e.clientX;
            tapEffect.y = e.clientY;
            tapEffect.radius = 0;
            tapEffect.active = true;
        });

        window.closeModal = function() {
            modal.classList.remove('active');
            modalOpen = false;
            player.tx = width/2; // Reset ke tengah biar aman
            player.ty = height/2;
        }

        function loop() {
            // Background Hitam
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);
            
            // GRID Latar (Dibuat lebih halus opacity-nya)
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.15)'; 
            ctx.lineWidth = 1;
            ctx.beginPath();
            let gridSize = 40;
            for (let i = 0; i < width; i += gridSize) { ctx.moveTo(i, 0); ctx.lineTo(i, height); }
            for (let j = 0; j < height; j += gridSize) { ctx.moveTo(0, j); ctx.lineTo(width, j); }
            ctx.stroke();

            // Efek Tap (Lingkaran menyebar)
            if (tapEffect.active) {
                ctx.strokeStyle = 'rgba(0, 255, 136, ' + (1 - tapEffect.radius/30) + ')';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(tapEffect.x, tapEffect.y, tapEffect.radius, 0, Math.PI*2);
                ctx.stroke();
                tapEffect.radius += 1.5;
                if (tapEffect.radius > 30) tapEffect.active = false;
            }

            if (!modalOpen) {
                if (player.tx !== null) {
                    let dx = player.tx - player.x;
                    let dy = player.ty - player.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist > 5) {
                        player.x += (dx/dist) * 6;
                        player.y += (dy/dist) * 6;
                    } else {
                        player.tx = null;
                    }
                }

                for (let obj of objects) {
                    let dist = Math.hypot(player.x - obj.x, player.y - obj.y);
                    
                    // Garis penghubung jika dekat
                    if (dist < 100) {
                        ctx.strokeStyle = 'rgba(0, 255, 136, 0.5)';
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(obj.x, obj.y); ctx.stroke();
                    }
                    
                    if (dist < 45) {
                        content.innerHTML = obj.text;
                        modal.classList.add('active');
                        modalOpen = true;
                        player.tx = null;
                    }
                }
            }

            // --- GAMBAR OBJEK (PERBAIKAN VISUAL) ---
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            
            for (let obj of objects) {
                // 1. Lingkaran Luar (Glow Neon)
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff88';
                ctx.strokeStyle = '#00ff88';
                ctx.fillStyle = 'rgba(0, 20, 10, 0.8)'; // Isi gelap agar teks pop
                ctx.lineWidth = 2;
                
                ctx.beginPath(); 
                ctx.arc(obj.x, obj.y, 35, 0, Math.PI*2); 
                ctx.fill();
                ctx.stroke();
                
                ctx.shadowBlur = 0; // Reset shadow

                // 2. Emoji
                ctx.font = '32px Arial';
                ctx.fillText(obj.emoji, obj.x, obj.y + 2);

                // 3. Label (Teks Putih Tebal & Background Label)
                ctx.font = 'bold 14px Segoe UI';
                ctx.fillStyle = '#ffffff'; 
                // Sedikit shadow hitam di teks biar makin jelas
                ctx.shadowColor="black";
                ctx.shadowBlur=4;
                ctx.fillText(obj.label, obj.x, obj.y + 55);
                ctx.shadowBlur=0;
            }

            // --- GAMBAR PLAYER ---
            // Aura Player
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#3498db';
            ctx.fillStyle = 'rgba(52, 152, 219, 0.2)';
            ctx.beginPath(); ctx.arc(player.x, player.y, 25, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // Ikon Player
            ctx.font = '40px Arial';
            ctx.fillText('🧙‍♂️', player.x, player.y);
            
            // Nama Player
            ctx.fillStyle = '#00ff88';
            ctx.font = 'bold 14px Segoe UI';
            ctx.fillText('Adriyan', player.x, player.y - 30);

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
