<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Adriyansah - IT Support Portfolio</title>
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f0f0f;
            --text: #fff;
        }
        body {
            margin: 0;
            overflow: hidden; /* Mencegah scroll browser */
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            touch-action: none; /* Mencegah zoom sentuh */
        }
        
        /* Modal Pop-up */
        #ui-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid var(--primary);
            padding: 20px;
            width: 85%;
            max-width: 400px;
            max-height: 80vh; /* Agar tidak kepanjangan di HP */
            overflow-y: auto;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            display: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 99;
            color: var(--text);
        }
        #ui-modal.active {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        
        /* Typography di dalam Modal */
        h2 { color: var(--primary); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1.2rem; }
        p, li { font-size: 0.9rem; line-height: 1.5; color: #ddd; }
        .highlight { color: var(--primary); font-weight: bold; }
        
        /* Tombol & Link */
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            font-weight: bold;
            color: #000;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
        .wa-btn {
            display: block;
            background: transparent;
            border: 1px solid #25D366;
            color: #25D366;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
        }
        
        /* Instruksi di Bawah */
        #instruct {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            pointer-events: none;
            text-shadow: 0 2px 4px #000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-modal">
        <div id="modal-content"></div>
        <button onclick="closeModal()">Tutup (x)</button>
    </div>

    <div id="instruct">
        Tap layar untuk bergerak • Tabrak ikon untuk info
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('ui-modal');
        const content = document.getElementById('modal-content');

        let width, height;
        let isMobile = false;
        
        // --- DATA CV ---
        const data = {
            profile: `<h2>🧙‍♂️ Profil Saya</h2>
                      <p><b>M. Adriyansah</b><br>IT Support & Network Enthusiast.</p>
                      <p>Mahasiswa tingkat akhir yang hobi oprek server, troubleshooting PC, dan memastikan jaringan lancar jaya.</p>
                      <p><span class="highlight">Skill:</span> Windows/Linux Server, Mikrotik Basics, Hardware Repair.</p>`,
            
            exp: `<h2>💼 Pengalaman</h2>
                  <p><span class="highlight">PT. Raharja Sinergi Komunikasi</span><br>
                  <i>Network Technician (2026)</i><br>• Troubleshooting jaringan & support user.</p>
                  <p><span class="highlight">Digitech University</span><br>
                  <i>Asisten IT (2021-2022)</i><br>• Maintenance lab & PC kampus.</p>`,
            
            edu: `<h2>🎓 Pendidikan</h2>
                  <p><b>S1 Teknik Informatika</b><br>Digitech University (2021-Now)</p>
                  <p><b>TKJ</b><br>SMKN 1 Katapang</p>
                  <p><b>Bahasa:</b> 🇮🇩 ID, 🇯🇵 JP (N4), 🇬🇧 EN (Basic)</p>`,
            
            contact: `<h2>📞 Kontak</h2>
                      <p>Siap bekerja segera!</p>
                      <p>📧 aldimadara2@gmail.com<br>📍 Bandung, Indonesia</p>
                      <a href="https://wa.me/6283817072264?text=Halo%20Adriyansah,%20saya%20lihat%20web%20Anda" class="wa-btn">
                        Chat WhatsApp 💬
                      </a>`
        };

        // --- SETUP GAME ---
        let player = { x: 0, y: 0, size: 30, color: '#3498db', tx: null, ty: null };
        let objects = [];
        let modalOpen = false;

        // Fungsi inisialisasi ukuran layar
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            isMobile = width < 600;

            // Reset Posisi Player ke Tengah Aman
            player.x = width / 2;
            player.y = height / 2;

            // Susun Ulang Objek Berdasarkan Layar
            objects = [
                { id: 'profile', emoji: '📋', label: 'Profil', text: data.profile },
                { id: 'exp', emoji: '💼', label: 'Kerja', text: data.exp },
                { id: 'edu', emoji: '🎓', label: 'Studi', text: data.edu },
                { id: 'contact', emoji: '📞', label: 'Kontak', text: data.contact }
            ];

            // LOGIKA POSISI (Agar tidak numpuk di HP)
            let cx = width / 2;
            let cy = height / 2;
            let spread = isMobile ? Math.min(width, height) / 2.5 : 200;

            if (isMobile) {
                // Posisi Vertikal (Atas, Bawah, Kiri Sedikit, Kanan Sedikit)
                objects[0].x = cx;          objects[0].y = cy - spread; // Profil (Atas)
                objects[1].x = cx + spread/1.5; objects[1].y = cy;          // Kerja (Kanan)
                objects[2].x = cx - spread/1.5; objects[2].y = cy;          // Studi (Kiri)
                objects[3].x = cx;          objects[3].y = cy + spread; // Kontak (Bawah)
            } else {
                // Posisi Landscape (Menyebar Horizontal)
                objects[0].x = cx - spread; objects[0].y = cy - 50;
                objects[1].x = cx + spread; objects[1].y = cy - 50;
                objects[2].x = cx - spread/2; objects[2].y = cy + 100;
                objects[3].x = cx + spread/2; objects[3].y = cy + 100;
            }
        }

        window.addEventListener('resize', resize);
        resize(); // Jalankan saat awal load

        // --- INPUT ---
        // Mouse / Touch
        canvas.addEventListener('pointerdown', e => {
            if (modalOpen) return;
            player.tx = e.clientX;
            player.ty = e.clientY;
        });

        function closeModal() {
            modal.classList.remove('active');
            modalOpen = false;
            // Geser player sedikit biar gak langsung kebuka lagi
            player.tx = width/2;
            player.ty = height/2;
        }
        window.closeModal = closeModal;

        // --- LOOP GAME ---
        function loop() {
            // Background Grid (Supaya tidak gelap gulita)
            ctx.fillStyle = '#0f0f0f';
            ctx.fillRect(0, 0, width, height);
            
            // Gambar Garis-garis Cyber
            ctx.strokeStyle = 'rgba(46, 204, 113, 0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < width; i += 50) { ctx.moveTo(i, 0); ctx.lineTo(i, height); }
            for (let j = 0; j < height; j += 50) { ctx.moveTo(0, j); ctx.lineTo(width, j); }
            ctx.stroke();

            if (!modalOpen) {
                // Pergerakan Player (Smooth)
                if (player.tx !== null) {
                    let dx = player.tx - player.x;
                    let dy = player.ty - player.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist > 5) {
                        player.x += (dx/dist) * 5; // Kecepatan 5
                        player.y += (dy/dist) * 5;
                    } else {
                        player.tx = null; // Sampai
                    }
                }

                // Cek Tabrakan
                for (let obj of objects) {
                    let dist = Math.hypot(player.x - obj.x, player.y - obj.y);
                    // Gambar koneksi garis jika dekat
                    if (dist < 100) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                        ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(obj.x, obj.y); ctx.stroke();
                    }
                    // Buka Modal jika sangat dekat
                    if (dist < 40) {
                        content.innerHTML = obj.text;
                        modal.classList.add('active');
                        modalOpen = true;
                        player.tx = null; // Stop jalan
                    }
                }
            }

            // Gambar Objek (Emoji)
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            ctx.font = '30px Arial';
            
            for (let obj of objects) {
                // Lingkaran di belakang ikon
                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                ctx.beginPath(); ctx.arc(obj.x, obj.y, 30, 0, Math.PI*2); ctx.fill();
                // Emoji
                ctx.fillText(obj.emoji, obj.x, obj.y);
                // Label text
                ctx.fillStyle = '#aaa';
                ctx.font = '12px Arial';
                ctx.fillText(obj.label, obj.x, obj.y + 40);
                ctx.font = '30px Arial'; // Balikin font
            }

            // Gambar Player (🧙‍♂️)
            ctx.fillText('🧙‍♂️', player.x, player.y);
            // Nama Player di atas kepala
            ctx.fillStyle = '#2ecc71';
            ctx.font = 'bold 12px Arial';
            ctx.fillText('Adriyan', player.x, player.y - 25);

            requestAnimationFrame(loop);
        }
        loop();

    </script>
</body>
</html>
