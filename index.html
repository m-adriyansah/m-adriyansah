<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Adriyansah - IT Support Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
        }
        canvas {
            background-color: #2c3e50;
            border: 4px solid #34495e;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        #ui-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            border: 2px solid #2ecc71;
            padding: 20px;
            width: 80%;
            max-width: 500px;
            border-radius: 8px;
            display: none;
            box-shadow: 0 0 15px #2ecc71;
        }
        #ui-modal.active {
            display: block;
        }
        #modal-content {
            margin-bottom: 20px;
            line-height: 1.5;
        }
        #modal-content h2 {
            color: #2ecc71;
            margin-top: 0;
            border-bottom: 1px solid #2ecc71;
            padding-bottom: 5px;
        }
        button {
            background-color: #2ecc71;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #27ae60;
        }
        #instructions {
            margin-top: 15px;
            text-align: center;
            color: #bdc3c7;
        }
        .highlight { color: #2ecc71; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="ui-modal">
            <div id="modal-content"></div>
            <button onclick="closeModal()">Tutup (ESC)</button>
        </div>
    </div>
    <div id="instructions">
        🎮 <b>Kontrol:</b> W,A,S,D atau Panah untuk bergerak. <br>
        Buka objek (Papan, Peti, Buku, Surat) dengan menabraknya lalu tekan <b>SPASI</b>.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('ui-modal');
        const modalContent = document.getElementById('modal-content');

        // Data CV Adriyansah
        const cvData = {
            profile: `<h2>Profil & Keahlian 🛡️</h2>
                      <p>Saya <b>M. Adriyansah</b>, Penggiat IT & AI. Mahasiswa tingkat akhir Teknik Informatika dengan rekam jejak solid di bidang IT Support, manajemen OS, dan pemeliharaan jaringan.</p>
                      <p><span class="highlight">Keahlian Utama:</span></p>
                      <ul>
                        <li>OS & Server: Windows, Linux (Ubuntu, Debian), Active Directory</li>
                        <li>Networking: LAN/WLAN, Troubleshooting Hardware/Software</li>
                        <li>Digital Mkt: OBS Live Streaming, WordPress CMS</li>
                      </ul>`,
            experience: `<h2>Pengalaman Kerja ⚔️</h2>
                         <p><span class="highlight">PT. Raharja Sinergi Komunikasi</span><br>
                         <i>Network & Helpdesk Technician (Okt 2026 - Des 2026)</i><br>
                         - Technical support & troubleshooting hardware/software.<br>
                         - Mengedukasi user untuk langkah preventif IT.</p>
                         <p><span class="highlight">Digitech University</span><br>
                         <i>Asisten IT Support (Jul 2021 - Agu 2022)</i><br>
                         - Maintenance infrastruktur IT kampus.<br>
                         - Troubleshooting harian perangkat desktop & optimasi performa.</p>`,
            education: `<h2>Pendidikan & Bahasa 📜</h2>
                        <p><span class="highlight">Digitech University</span><br>
                        S1 Teknik Informatika (2021 - Sekarang)</p>
                        <p><span class="highlight">SMKN 1 Katapang</span><br>
                        Teknik Komputer & Jaringan (2016 - 2019)</p>
                        <p><span class="highlight">Bahasa:</span> Indonesia (Native), Jepang (N4), Inggris (Dasar), Jerman (Dasar)</p>`,
            contact: `<h2>Kontak ✉️</h2>
                      <p>Tertarik untuk bekerja sama atau memiliki lowongan IT Support?</p>
                      <p>📍 Lokasi: Bandung<br>
                      📧 Email: aldimadara2@gmail.com<br>
                      📱 Telepon: +62-838-1707-2264</p>`
        };

        // Player Setup
        const player = {
            x: 400, y: 250, size: 30, speed: 4, color: '#3498db',
            dx: 0, dy: 0
        };

        // Interactable Objects
        const objects = [
            { id: 'profile', x: 150, y: 100, size: 40, color: '#e67e22', label: 'Papan Info', text: cvData.profile },
            { id: 'experience', x: 600, y: 150, size: 40, color: '#f1c40f', label: 'Peti Kerja', text: cvData.experience },
            { id: 'education', x: 200, y: 350, size: 40, color: '#9b59b6', label: 'Buku Ilmu', text: cvData.education },
            { id: 'contact', x: 650, y: 350, size: 40, color: '#e74c3c', label: 'Kotak Surat', text: cvData.contact }
        ];

        let keys = {};
        let isModalOpen = false;
        let currentInteractable = null;

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ' && currentInteractable && !isModalOpen) {
                openModal(currentInteractable.text);
            }
            if (e.key === 'Escape' && isModalOpen) {
                closeModal();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function openModal(content) {
            modalContent.innerHTML = content;
            modal.classList.add('active');
            isModalOpen = true;
        }

        function closeModal() {
            modal.classList.remove('active');
            isModalOpen = false;
            keys[' '] = false; // reset space key
        }

        function checkCollision(rect1, rect2) {
            return (rect1.x < rect2.x + rect2.size &&
                    rect1.x + rect1.size > rect2.x &&
                    rect1.y < rect2.y + rect2.size &&
                    rect1.y + rect1.size > rect2.y);
        }

        function update() {
            if (isModalOpen) return; // Pause movement if modal is open

            // Movement
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // Canvas Boundaries
            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x + player.size > canvas.width) player.x = canvas.width - player.size;
            if (player.y + player.size > canvas.height) player.y = canvas.height - player.size;

            // Interaction Check
            currentInteractable = null;
            for (let obj of objects) {
                // expand hit box slightly for easier interaction
                let interactionZone = { x: obj.x - 10, y: obj.y - 10, size: obj.size + 20 };
                if (checkCollision(player, interactionZone)) {
                    currentInteractable = obj;
                    break;
                }
            }
        }

        function draw() {
            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Objects
            for (let obj of objects) {
                ctx.fillStyle = obj.color;
                ctx.fillRect(obj.x, obj.y, obj.size, obj.size);
                
                // Draw Label
                ctx.fillStyle = '#fff';
                ctx.font = '14px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(obj.label, obj.x + obj.size/2, obj.y - 10);

                // Highlight if player is near
                if (currentInteractable === obj) {
                    ctx.strokeStyle = '#2ecc71';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(obj.x - 5, obj.y - 5, obj.size + 10, obj.size + 10);
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillText('[SPASI]', obj.x + obj.size/2, obj.y + obj.size + 20);
                }
            }

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start Game
        gameLoop();
    </script>
</body>
</html>
